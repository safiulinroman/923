<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Программирование на языке PHP</title>
</head>	
<body>

	<h1>Отправка данных на сервер</h1>
	<h2>Отправка форм</h2>

	<form>
		Фамилия: <input type="text"><p>
		Имя: <input type="text"><p>
		Отчество: <input type="text"><p>
		Должность: <input type="text"><p>
		Уровень образования: 
		<select>
			<option>Высшее (бакалавриат)</option>
			<option>Высшее (специалитет, магистратура)</option>
			<option>Подготовка кадров высшей квалификации</option>
			<option>Среднее профессиональное</option>
		</select><p>
		Категория: 
		Высшая <input type="radio">
		Первая <input type="radio">
		Соответствие занимаемой должности <input type="radio"><p>
		Общий стаж: <input type="number" step="0.1"><p>
		Стаж в техникуме: <input type="number" step="0.1"><p>	
		
		<input type="submit">
	</form>
	

</body>
</html>
